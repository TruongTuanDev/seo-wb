name: CI

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: seo-wb-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: seo-wb-backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Run backend tests
        env:
          APP_ENV: test
          APP_SECRET_KEY: ci-test-secret-key
          DATABASE_URL: sqlite:///./ci_test.db
          DB_AUTO_CREATE: "true"
          COOKIE_SECURE: "false"
          JWT_BIND_USER_AGENT: "true"
        run: python -m pytest

  frontend-build:
    name: Frontend lint and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: seo-wb-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: seo-wb-frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend lint
        run: npm run lint

      - name: Run frontend build
        env:
          NEXT_PUBLIC_API_URL: https://api.example.com/api/v1
          NEXT_PUBLIC_CSRF_COOKIE_NAME: seller_wb_csrf
        run: npm run build

  production-compose-validate:
    name: Validate production compose
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare example env files
        run: |
          cp deploy/env/compose.env.example deploy/env/compose.env
          cp deploy/env/backend.env.example deploy/env/backend.env

      - name: Validate docker compose
        run: docker compose --env-file deploy/env/compose.env -f docker-compose.production.yml config

      - name: Validate deploy script syntax
        run: bash -n deploy/vps-deploy.sh
