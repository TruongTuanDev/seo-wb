services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-seo_wb_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - ./deploy/env/backend.env
      - ./deploy/env/backend.runtime.env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-seo_wb_db}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - backend_storage:/app/storage

  worker:
    build:
      context: .
    restart: unless-stopped
    command: ["python", "-m", "app.workers.image_generation_worker"]
    env_file:
      - ./deploy/env/backend.env
      - ./deploy/env/backend.runtime.env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-seo_wb_db}
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
    volumes:
      - backend_storage:/app/storage

  sync-worker:
    build:
      context: .
    restart: unless-stopped
    command: ["python", "-m", "app.workers.wb_sync_worker"]
    env_file:
      - ./deploy/env/backend.env
      - ./deploy/env/backend.runtime.env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-seo_wb_db}
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
    volumes:
      - backend_storage:/app/storage

  finance-worker:
    build:
      context: .
    restart: unless-stopped
    command: ["python", "-m", "app.workers.finance_auto_sync_worker"]
    env_file:
      - ./deploy/env/backend.env
      - ./deploy/env/backend.runtime.env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-seo_wb_db}
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
    volumes:
      - backend_storage:/app/storage

  finance-scheduler:
    build:
      context: .
    restart: unless-stopped
    command: ["python", "-m", "app.workers.finance_nightly_scheduler"]
    env_file:
      - ./deploy/env/backend.env
      - ./deploy/env/backend.runtime.env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-seo_wb_db}
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
    volumes:
      - backend_storage:/app/storage

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${BACKEND_HTTP_PORT:-8000}:80"
    volumes:
      - ./deploy/nginx/backend.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_storage:
