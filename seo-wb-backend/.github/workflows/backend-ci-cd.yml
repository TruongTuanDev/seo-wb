name: Backend CI/CD

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          APP_ENV: test
          APP_SECRET_KEY: ci-test-secret-key
          DATABASE_URL: sqlite:///./ci_test.db
          DB_AUTO_CREATE: "true"
          COOKIE_SECURE: "false"
        run: python -m pytest

  deploy:
    name: Deploy backend
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Check deploy secrets
        id: deploy_secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          if [ -n "$VPS_HOST" ] && [ -n "$VPS_USER" ] && [ -n "$VPS_SSH_PRIVATE_KEY" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Deploy skipped: configure VPS_HOST, VPS_USER, and VPS_SSH_PRIVATE_KEY repository secrets."
          fi

      - name: Configure SSH
        if: steps.deploy_secrets.outputs.configured == 'true'
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${VPS_PORT:-22}" -H "$VPS_HOST" >> ~/.ssh/known_hosts || true

      - name: Test SSH login
        if: steps.deploy_secrets.outputs.configured == 'true'
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          ssh -i ~/.ssh/deploy_key -p "${VPS_PORT:-22}" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            "${VPS_USER}@${VPS_HOST}" \
            "echo 'SSH login OK for backend deploy'"

      - name: Deploy backend
        if: steps.deploy_secrets.outputs.configured == 'true'
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_BRANCH: ${{ secrets.DEPLOY_BRANCH }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          REDIS_USER: ${{ secrets.REDIS_USER }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          REDIS_SSL: ${{ secrets.REDIS_SSL }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          CLOUD_DINARY_NAME: ${{ secrets.CLOUD_DINARY_NAME }}
          CLOUD_DINARY_API_KEY: ${{ secrets.CLOUD_DINARY_API_KEY }}
          CLOUD_DINARY_API_SECRET: ${{ secrets.CLOUD_DINARY_API_SECRET }}
          GENERATED_IMAGE_JPEG_QUALITY: ${{ secrets.GENERATED_IMAGE_JPEG_QUALITY }}
          OPENAI_IMAGE_MODEL: ${{ secrets.OPENAI_IMAGE_MODEL }}
          OPENAI_IMAGE_CONCURRENCY: ${{ secrets.OPENAI_IMAGE_CONCURRENCY }}
          OPENAI_IMAGE_RETRY_ATTEMPTS: ${{ secrets.OPENAI_IMAGE_RETRY_ATTEMPTS }}
        run: |
          APP_DIR="${DEPLOY_PATH:-/opt/seller-wb-backend}"
          BRANCH="${DEPLOY_BRANCH:-main}"
          RUNTIME_ENV_FILE="$(mktemp)"
          write_env() {
            local key="$1"
            local value="${!key:-}"
            if [ -n "$value" ]; then
              printf '%s=%s\n' "$key" "$value" >> "$RUNTIME_ENV_FILE"
            fi
          }
          for key in \
            REDIS_URL REDIS_HOST REDIS_USER REDIS_PASSWORD REDIS_SSL \
            CLOUDINARY_CLOUD_NAME CLOUDINARY_API_KEY CLOUDINARY_API_SECRET \
            CLOUD_DINARY_NAME CLOUD_DINARY_API_KEY CLOUD_DINARY_API_SECRET \
            GENERATED_IMAGE_JPEG_QUALITY \
            OPENAI_IMAGE_MODEL OPENAI_IMAGE_CONCURRENCY OPENAI_IMAGE_RETRY_ATTEMPTS
          do
            write_env "$key"
          done
          scp -i ~/.ssh/deploy_key -P "${VPS_PORT:-22}" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            "$RUNTIME_ENV_FILE" "${VPS_USER}@${VPS_HOST}:/tmp/seller-wb-backend.runtime.env"
          ssh -i ~/.ssh/deploy_key -p "${VPS_PORT:-22}" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            "${VPS_USER}@${VPS_HOST}" \
            "export APP_DIR='${APP_DIR}' BRANCH='${BRANCH}'; mkdir -p \"\$APP_DIR/deploy/env\" && mv /tmp/seller-wb-backend.runtime.env \"\$APP_DIR/deploy/env/backend.runtime.env\" && bash \"\$APP_DIR/deploy/vps-deploy.sh\""
