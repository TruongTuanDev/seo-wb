events {}

http {
    server {
        listen 80;
        server_name skidkaberry.com www.skidkaberry.com;

        return 301 https://skidkaberry.com$request_uri;
    }

    server {
        listen 443 ssl;
        server_name skidkaberry.com www.skidkaberry.com;

        client_max_body_size 50m;

        ssl_certificate /etc/letsencrypt/live/skidkaberry.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/skidkaberry.com/privkey.pem;

        location /api/ {
            proxy_pass http://backend-nest:3001/api/;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            proxy_connect_timeout 60s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }

        location /storage/ {
            proxy_pass http://minio:9000/;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location / {
            proxy_pass http://frontend-next:3000;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    server {
        listen 80;
        server_name seo-wb.com www.seo-wb.com;

        return 301 https://seo-wb.com$request_uri;
    }

    server {
        listen 443 ssl;
        server_name seo-wb.com www.seo-wb.com;

        client_max_body_size 50m;

        ssl_certificate /etc/letsencrypt/live/seo-wb.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/seo-wb.com/privkey.pem;

        location /api/ {
            proxy_pass http://103.245.237.160:8000/api/;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            proxy_connect_timeout 60s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }

        location /storage/ {
            proxy_pass http://103.245.237.160:8000/storage/;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location / {
            proxy_pass http://103.245.237.160:3000;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
