services:
  frontend:
    build:
      context: .
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_CSRF_COOKIE_NAME: ${NEXT_PUBLIC_CSRF_COOKIE_NAME:-seller_wb_csrf}
        NEXT_PUBLIC_ENABLE_FINANCE: ${NEXT_PUBLIC_ENABLE_FINANCE:-false}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_CSRF_COOKIE_NAME: ${NEXT_PUBLIC_CSRF_COOKIE_NAME:-seller_wb_csrf}
      NEXT_PUBLIC_ENABLE_FINANCE: ${NEXT_PUBLIC_ENABLE_FINANCE:-false}

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${FRONTEND_HTTP_PORT:-3000}:80"
    volumes:
      - ./deploy/nginx/frontend.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
