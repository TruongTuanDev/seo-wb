name: Frontend CI/CD

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: https://api.example.com/api/v1
          NEXT_PUBLIC_CSRF_COOKIE_NAME: seller_wb_csrf
        run: npm run build

      - name: Lint maintained files
        run: npm exec eslint -- contexts/AuthContext.tsx lib/api.ts "app/(auth)/login/page.tsx" "app/(auth)/register/page.tsx" next.config.ts

  deploy:
    name: Deploy frontend
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Check deploy secrets
        id: deploy_secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          if [ -n "$VPS_HOST" ] && [ -n "$VPS_USER" ] && [ -n "$VPS_SSH_PRIVATE_KEY" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Deploy skipped: configure VPS_HOST, VPS_USER, and VPS_SSH_PRIVATE_KEY repository secrets."
          fi

      - name: Configure SSH
        if: steps.deploy_secrets.outputs.configured == 'true'
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${VPS_PORT:-22}" -H "$VPS_HOST" >> ~/.ssh/known_hosts || true

      - name: Test SSH login
        if: steps.deploy_secrets.outputs.configured == 'true'
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          ssh -i ~/.ssh/deploy_key -p "${VPS_PORT:-22}" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            "${VPS_USER}@${VPS_HOST}" \
            "echo 'SSH login OK for frontend deploy'"

      - name: Deploy frontend
        if: steps.deploy_secrets.outputs.configured == 'true'
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_BRANCH: ${{ secrets.DEPLOY_BRANCH }}
        run: |
          APP_DIR="${DEPLOY_PATH:-/opt/seller-wb-frontend}"
          BRANCH="${DEPLOY_BRANCH:-main}"
          ssh -i ~/.ssh/deploy_key -p "${VPS_PORT:-22}" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            "${VPS_USER}@${VPS_HOST}" \
            "APP_DIR='${APP_DIR}' BRANCH='${BRANCH}' bash '${APP_DIR}/deploy/vps-deploy.sh'"
